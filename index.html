<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PaySync — Payment Schedule</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<style>
:root{--bg:#f5f4f0;--bg2:#fff;--bg3:#eeecea;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);--text:#1a1a24;--text2:#3a3a4a;--text3:#5a5a6e;--muh:#3b2fd0;--wife:#0a7a4a;--red:#b52a2a;--green:#0a7a4a;--r:13px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;padding-bottom:30px;}
.header{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:14px 16px 0;position:sticky;top:0;z-index:50;}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logo{font-size:17px;font-weight:600;color:var(--text);}.logo span{color:var(--muh);}
.sub{font-size:11px;color:var(--text3);margin-top:2px;}
.cbtn{font-size:12px;font-weight:600;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border2);background:var(--bg2);color:var(--muh);cursor:pointer;font-family:'DM Sans',sans-serif;}
.filters{display:flex;overflow-x:auto;scrollbar-width:none;border-top:0.5px solid var(--border);}
.filters::-webkit-scrollbar{display:none;}
.ftab{flex:none;padding:10px 16px;font-size:12px;font-weight:500;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.ftab.active{color:var(--muh);border-bottom-color:var(--muh);}
.notice{background:rgba(59,47,208,0.05);border-bottom:0.5px solid rgba(59,47,208,0.15);padding:10px 16px;font-size:12px;color:var(--muh);line-height:1.6;}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 16px;background:var(--bg2);border-bottom:0.5px solid var(--border);}
.sc{background:var(--bg3);border-radius:var(--rs);padding:10px 12px;}
.sc .sl{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;}
.sc .sv{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;}
.legend{display:flex;gap:14px;padding:9px 16px;background:var(--bg2);border-bottom:0.5px solid var(--border);flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
.ld{width:8px;height:8px;border-radius:50%;}
.feed{padding:12px 16px;}
.mdiv{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);padding:16px 0 8px;display:flex;align-items:center;gap:8px;}
.mdiv::after{content:'';flex:1;height:0.5px;background:var(--border2);}
.pcheck{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.pcheck.sf{border-left:3px solid var(--red);}
.pcheck.mc{border-left:3px solid var(--muh);}
.pcheck.wc{border-left:3px solid var(--wife);}
.chdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.chdr:active{background:var(--bg3);}
.pb{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;flex-shrink:0;}
.mb{background:rgba(59,47,208,0.1);color:var(--muh);}
.wb{background:rgba(10,122,74,0.1);color:var(--wife);}
.cd{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;flex:1;color:var(--text);}
.cn{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;}
.cn.m{color:var(--muh);}.cn.w{color:var(--wife);}
.chv{font-size:16px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.pcheck.collapsed .chv{transform:rotate(-90deg);}
.cbody{padding:0 14px;}
.pcheck.collapsed .cbody{display:none;}
.nobills{padding:14px 0;font-size:13px;color:var(--text3);font-style:italic;}
.brow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.brow:last-of-type{border-bottom:none;}
.bd{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.bn{flex:1;font-size:13px;color:var(--text);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bdue{font-size:10px;color:var(--text3);flex-shrink:0;font-family:'DM Mono',monospace;}
.at{font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;background:rgba(181,42,42,0.08);color:var(--red);flex-shrink:0;}
.ba{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:var(--text);flex-shrink:0;min-width:62px;text-align:right;}
.trow{display:flex;justify-content:space-between;align-items:center;padding:10px 0 4px;}
.tl{font-size:12px;color:var(--text3);}
.tb{font-family:'DM Mono',monospace;font-size:12px;color:var(--red);}
.tleft{font-family:'DM Mono',monospace;font-size:17px;font-weight:700;}
.pos{color:var(--green);}.neg{color:var(--red);}
.avl{margin:0 0 12px;background:rgba(59,47,208,0.05);border:0.5px solid rgba(59,47,208,0.18);border-radius:var(--rs);padding:9px 12px;font-size:12px;color:var(--muh);line-height:1.6;}
.sfail{margin:0 0 12px;background:rgba(181,42,42,0.05);border:0.5px solid rgba(181,42,42,0.2);border-radius:var(--rs);padding:9px 12px;font-size:12px;color:var(--red);line-height:1.6;}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;}
</style>
</head>

let filter='all',collapsed=false;
const fmt=n=>'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
function render(){
  const feed=document.getElementById('feed');
  const list=C.filter(c=>{
    if(filter==='shortfall') return c.sf;
    if(filter==='highcredit') return c.b.some(x=>x.h);
    return true;
  });
  if(!list.length){feed.innerHTML='<div class="empty">No results.</div>';return;}
  let html='',lastMo='';
  list.forEach(c=>{
    if(c.mo!==lastMo){html+=`<div class="mdiv">${c.mo}</div>`;lastMo=c.mo;}
    const tot=c.b.reduce((s,x)=>s+x.a,0);
    const left=c.net-tot;
    const isMuh=c.p==='Muhammad';
    const bc=c.sf?'sf':(isMuh?'mc':'wc');
    const rows=c.b.length===0
      ? `<div class="nobills">No bills due — entire check available for debt payoff.</div>`
      : c.b.map(x=>{
          const dot=x.h?'#b52a2a':(isMuh?'#3b2fd0':'#0a7a4a');
          const apr=x.h?`<span class="at">${x.apr}%</span>`:'';
          return `<div class="brow"><div class="bd" style="background:${dot}"></div><div class="bn">${x.n}</div><div class="bdue">${x.d}</div>${apr}<div class="ba">${fmt(x.a)}</div></div>`;
        }).join('');
    const tip=c.sf
      ?`<div class="sfail">⚠ Shortfall ${fmt(Math.abs(left))} — month-start bills exceed Wife check. Cover from previous Muhammad leftover or savings.</div>`
      :(c.tip?`<div class="avl">${c.tip}</div>`:'');
    const totRow=c.b.length>0?`<div class="trow">
          <div class="tl">Bills: <span class="tb">${fmt(tot)}</span></div>
          <div style="text-align:right">
            <div style="font-size:10px;color:var(--text3);margin-bottom:2px">Leftover</div>
            <div class="tleft ${left>=0?'pos':'neg'}">${left>=0?'+':''}${fmt(left)}</div>
          </div>
        </div>`:`<div class="trow"><div class="tl">No bills</div><div class="tleft pos">+${fmt(c.net)}</div></div>`;
    html+=`<div class="pcheck ${bc}">
      <div class="chdr" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="pb ${isMuh?'mb':'wb'}">${c.p}</span>
        <span class="cd">${c.date}</span>
        <span class="cn ${isMuh?'m':'w'}">${fmt(c.net)}</span>
        <i class="ti ti-chevron-down chv" aria-hidden="true"></i>
      </div>
      <div class="cbody">
        ${rows}
        ${totRow}
        ${tip}
      </div>
    </div>`;
  });
  feed.innerHTML=html;
}
function toggleAll(){
  collapsed=!collapsed;
  document.querySelectorAll('.pcheck').forEach(c=>collapsed?c.classList.add('collapsed'):c.classList.remove('collapsed'));
  document.getElementById('toggleBtn').textContent=collapsed?'Expand All':'Collapse All';
}
document.querySelectorAll('.ftab').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    filter=b.dataset.filter;
    render();
  });
});
render();
