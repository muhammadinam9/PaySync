// ── PARSE GVIZ JSON RESPONSE ──
function parseGviz(text){
  // gviz returns: google.visualization.Query.setResponse({...})
  const json=JSON.parse(text.replace(/^[^\(]+\(/,'').replace(/\);?\s*$/,''));
  const cols=json.table.cols.map(c=>c.label);
  const rows=json.table.rows||[];

  return rows.map(row=>{
    const obj={};
    cols.forEach((col,i)=>{
      const cell=row.c&&row.c[i];
      obj[col]=cell&&cell.v!=null?String(cell.v):'';
    });
    return obj;
  }).filter(r=>r['Bill / Card Name']&&r['Bill / Card Name'].trim());
}

function parseAnyDate(raw) {
  if (!raw) return null;
  raw = raw.trim().replace(/"/g,'');

  // Try M/D/YYYY or MM/DD/YYYY
  let m = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return `${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;

  // Try YYYY-MM-DD
  m = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;

  // Try Date object string like "Mon Jun 16 2026 ..."
  const d = new Date(raw);
  if (!isNaN(d)) {
    const yr=d.getFullYear();
    const mo=String(d.getMonth()+1).padStart(2,'0');
    const dy=String(d.getDate()).padStart(2,'0');
    return `${yr}-${mo}-${dy}`;
  }
  return null;
}

function rowsToBills(rows){
  console.log('rowsToBills: processing',rows.length,'rows');
  if(rows.length>0) console.log('Sample row keys:',Object.keys(rows[0]),'Sample due date:',rows[0]['Actual Due Date']);

  return rows.map(r=>{
    const name=(r['Bill / Card Name']||'').trim();
    if(!name) return null;
    const min=parseFloat((r['Min Payment ($)']||'0').replace(/[$,]/g,''))||0;
    const apr=parseFloat((r['APR (%)']||'0').replace(/[%,]/g,''))||0;
    const dueRaw=(r['Actual Due Date']||'').trim();

    if(!dueRaw||!min) {
      console.log('Skipping',name,'— dueRaw:',dueRaw,'min:',min);
      return null;
    }

    const due = parseAnyDate(dueRaw);
    if(!due || isNaN(new Date(due+'T12:00:00'))) {
      console.log('Could not parse date for',name,'raw:',dueRaw);
      return null;
    }

    const h=apr>=22.5;
    console.log('Parsed:',name,'due:',due,'min:',min,'high:',h);
    return {n:name, due, a:min, apr, h};
  }).filter(Boolean);
}

      reject(new Error('JSONP timeout'));
    }, 10000);

    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };

    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    script.src = url + '?callback=' + cbName + '&t=' + Date.now();
    script.onerror = () => { cleanup(); reject(new Error('JSONP script error')); };
    document.head.appendChild(script);
  });
}

async function loadData(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('subText').textContent='Fetching from Google Sheets...';

  try{
    // Try Worker first, fall back to JSONP direct to Apps Script
    let json = null;
    
    // Attempt 1: Cloudflare Worker
    try {
      const resp = await fetch(WORKER_URL + '?t=' + Date.now());
      if (resp.ok) {
        const j = await resp.json();
        if (j.status === 'ok' && j.bills && j.bills.length > 0) {
          json = j;
          console.log('✅ Worker: got', j.bills.length, 'bills');
        }
      }
    } catch(e) { console.warn('Worker failed:', e.message); }

    // Attempt 2: JSONP directly to Apps Script (no CORS needed)
    if (!json) {
      console.log('Trying JSONP fallback...');
      json = await fetchJSONP(SCRIPT_URL);
    }

    if (!json || json.status === 'error') throw new Error(json ? json.message : 'All fetch methods failed');
    const bills = json.bills;
    if (!bills || !bills.length) throw new Error('No bill data returned');
    console.log('✅ Got', bills.length, 'bills. First due date:', bills[0]['Actual Due Date']);

    const totalMin=bills.reduce((s,b)=>s+(parseFloat((b['Min Payment ($)']||'0').replace(/[$,]/g,''))||0),0);
    document.getElementById('totalMin').textContent=fmt(totalMin);
    buildSchedule(rowsToBills(bills));

    const now=new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    document.getElementById('lastUpdated').textContent='Live data · Last fetched: '+now;
    document.getElementById('subText').textContent='Live · Jun 2026 → Mar 2027';
    document.getElementById('noticeBar').className='notice live';
    document.getElementById('noticeText').textContent='Live data — pulled from your Google Spreadsheet. Change a due date → hit Refresh → updates instantly.';
    render();

  }catch(e){
    console.warn('Live fetch failed:',e.message,'— using static fallback');
    buildSchedule(STATIC_BILLS);
    document.getElementById('subText').textContent='Cached data · Jun 2026 → Mar 2027';
    document.getElementById('lastUpdated').textContent='⚠ Could not reach Google Sheets ('+e.message+') — showing last known data. Hit Refresh to try again.';
    document.getElementById('noticeBar').className='notice cached';
    document.getElementById('noticeText').textContent='Showing cached snapshot. Hit Refresh to load live data from your spreadsheet.';
    render();
  }
  btn.classList.remove('spinning');
}

function render(){
  const feed=document.getElementById('feed');
  const list=SCHEDULE.filter(c=>{
    if(currentFilter==='shortfall') return c.sf;
    if(currentFilter==='highcredit') return c.b.some(x=>x.h);
    return true;
  });
  if(!list.length){feed.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)">No results.</div>';return;}
  let html='',lastMo='';
  list.forEach(c=>{
    if(c.mo!==lastMo){html+=`<div class="mdiv" data-mo="${c.mo}">${c.mo}</div>`;lastMo=c.mo;}
    const tot=c.b.reduce((s,x)=>s+x.a,0);
    const left=c.net-tot;
    const isMuh=c.p==='Muhammad';
    const bc=c.sf?'sf':(isMuh?'mc':'wc');
    const rows=c.b.length===0
      ?`<div class="nobills">No bills due — full check goes to debt payoff.</div>`
      :c.b.map(x=>{
        const dot=x.h?'#b52a2a':(isMuh?'#3b2fd0':'#0a7a4a');
        const apr=x.h?`<span class="at">${x.apr}%</span>`:'';
        return `<div class="brow"><div class="bd" style="background:${dot}"></div><div class="bn">${x.n}</div><div class="bdue">${x.d}</div>${apr}<div class="ba">${fmt(x.a)}</div><button class="mpbtn" onclick="openMarkPaid('${x.n.replace(/'/g,"&apos;")}')" id="mpb-${x.n.replace(/[^a-z0-9]/gi,'_')}">✓ Pay</button></div>`;
      }).join('');
    const totRow=c.b.length>0
      ?`<div class="trow"><div class="tl">Bills: <span class="tb">${fmt(tot)}</span></div><div style="text-align:right"><div style="font-size:10px;color:var(--text3);margin-bottom:2px">Leftover</div><div class="tleft ${left>=0?'pos':'neg'}">${left>=0?'+':''}${fmt(left)}</div></div></div>`
      :`<div class="trow"><div class="tl">No bills</div><div class="tleft pos">+${fmt(c.net)}</div></div>`;
    const tip=c.sf
      ?`<div class="sfail">⚠ Shortfall ${fmt(Math.abs(left))} — month-start bills exceed Wife check. Cover from previous Muhammad leftover.</div>`
      :(c.tip?`<div class="avl">${c.tip}</div>`:'');
    html+=`<div class="pcheck ${bc}">
      <div class="chdr" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="pb ${isMuh?'mb':'wb'}">${c.p}</span>
        <span class="cd">${c.date}</span>
        <span class="cn ${isMuh?'m':'w'}">${fmt(c.net)}</span>
        <i class="ti ti-chevron-down chv" aria-hidden="true"></i>
      </div>
      <div class="cbody">${rows}${totRow}${tip}</div>
    </div>`;
  });
  feed.innerHTML=html;
  if(collapsed) document.querySelectorAll('.pcheck').forEach(c=>c.classList.add('collapsed'));
}

function toggleAll(){
  collapsed=!collapsed;
  document.querySelectorAll('.pcheck').forEach(c=>collapsed?c.classList.add('collapsed'):c.classList.remove('collapsed'));
  document.getElementById('toggleBtn').textContent=collapsed?'Expand All':'Collapse All';
}

// Jump bar
document.querySelectorAll('.jbtn').forEach(b=>{
  b.addEventListener('click',()=>{
    const mo=b.dataset.mo;
    document.querySelectorAll('.mdiv').forEach(d=>{
      if(d.dataset.mo===mo){
        const hdrH=document.querySelector('.header').offsetHeight+document.querySelector('.jumpbar').offsetHeight;
        window.scrollTo({top:d.getBoundingClientRect().top+window.scrollY-hdrH-8,behavior:'smooth'});
        document.querySelectorAll('.jbtn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
      }
    });
  });
});

// Scroll spy
window.addEventListener('scroll',()=>{
  const hdrH=document.querySelector('.header').offsetHeight+document.querySelector('.jumpbar').offsetHeight+20;
  let cur='';
  document.querySelectorAll('.mdiv').forEach(d=>{if(d.getBoundingClientRect().top<=hdrH)cur=d.dataset.mo;});
  document.querySelectorAll('.jbtn').forEach(b=>b.classList.toggle('active',b.dataset.mo===cur));
},{passive:true});

// Filters
document.querySelectorAll('.ftab').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentFilter=b.dataset.filter;
    render();
  });
});

loadData();

// ── MARK PAID ──
let currentBill = '';

function openMarkPaid(billName) {
  currentBill = billName;
  document.getElementById('modalTitle').textContent = billName;
  document.getElementById('mDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('mAmount').value = '';
  document.getElementById('mNote').value = '';
  document.getElementById('mSaving').style.display = 'none';
  document.getElementById('mSaveBtn').disabled = false;
  document.getElementById('modalBd').classList.add('open');
  setTimeout(() => document.getElementById('mAmount').focus(), 300);
}

function closeModal() {
  document.getElementById('modalBd').classList.remove('open');
}

document.getElementById('modalBd').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

async function savePaid() {
  const date   = document.getElementById('mDate').value;
  const amount = parseFloat(document.getElementById('mAmount').value);
  const note   = document.getElementById('mNote').value.trim();

  if (!date)           { alert('Please enter the date paid.'); return; }
  if (!amount || amount <= 0) { alert('Please enter a valid amount.'); return; }

  // Disable button, show saving
  document.getElementById('mSaveBtn').disabled = true;
  document.getElementById('mSaving').style.display = 'block';

  try {
    // Try Worker for POST, fall back to direct Apps Script GET with params
    let resp;
    const postBody = JSON.stringify({
      billName: currentBill, datePaid: date, amountPaid: amount, note: note
    });
    
    try {
      resp = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: postBody,
      });
    } catch(e) {
      // Fallback: send as GET params to Apps Script (JSONP)
      const params = new URLSearchParams({
        action: 'markPaid',
        billName: currentBill,
        datePaid: date,
        amountPaid: amount,
        note: note
      });
      const jsonpResp = await fetchJSONP(SCRIPT_URL + '?' + params.toString());
      if (jsonpResp && jsonpResp.status === 'ok') {
        handlePaySuccess(jsonpResp);
        return;
      }
      throw new Error('Both Worker and direct Script failed');
    }

    const result = await resp.json();

    if (result.status === 'ok') {
      handlePaySuccess(result);
    } else {
      throw new Error(result.message || 'Unknown error');
    }

  } catch(err) {
    alert('Error saving payment: ' + err.message);
    document.getElementById('mSaveBtn').disabled = false;
    document.getElementById('mSaving').style.display = 'none';
  }
}


function handlePaySuccess(result) {
  const btnId = 'mpb-' + currentBill.replace(/[^a-z0-9]/gi, '_');
  const btn = document.getElementById(btnId);
  if (btn) { btn.textContent = '✓ Paid'; btn.classList.add('paid'); }
  closeModal();
  showToast('✅ ' + currentBill + ' marked paid! New due: ' + result.newDueDate);
  setTimeout(() => loadData(), 2000);
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a24;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:500;text-align:center;max-width:320px;line-height:1.4;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 4000);
}

</script>
